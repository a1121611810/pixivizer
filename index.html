<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="color-scheme" content="light dark" />
    <title>Pictelio</title>
    <link rel="icon" type="image/svg+xml" href="/pixivizer/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/pixivizer/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/pixivizer/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/pixivizer/logo-192x192.png" />
    <style>
      /* 最小化防 FOUC：在 CSS 文件加载前设置背景和主题 */
      html {
        background-color: #f5f5f5;
        color: #242424;
      }
      html.dark {
        background-color: #141414;
        color: #ffffff;
      }
    </style>
    <!-- 防闪白脚本：在 hydration 前根据 localStorage + 系统偏好设置正确的 class -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("theme") || "system";
          var mql = window.matchMedia("(prefers-color-scheme: dark)");
          var resolved = theme === "system" ? (mql.matches ? "dark" : "light") : theme;
          if (resolved === "dark") {
            document.documentElement.classList.add("dark");
          }
          document.documentElement.style.backgroundColor =
            resolved === "dark" ? "#141414" : "#f5f5f5";
          document.documentElement.style.color = resolved === "dark" ? "#ffffff" : "#242424";
        } catch (e) {}
      })();
    </script>
    <script type="module" crossorigin src="/pixivizer/assets/index-BYX_pfj0.js"></script>
    <link rel="modulepreload" crossorigin href="/pixivizer/assets/dist-BvwCN70j.js">
    <link rel="stylesheet" crossorigin href="/pixivizer/assets/index-DL1cHMwx.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
