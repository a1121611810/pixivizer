<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>需要升级 WebView</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; min-height: 100dvh;
    background: #141414; color: #ffffff;
    padding: 24px;
  }
  .card {
    max-width: 360px; width: 100%;
    text-align: center;
  }
  .icon { font-size: 48px; margin-bottom: 20px; }
  h1 {
    font-size: 20px; font-weight: 600;
    margin-bottom: 12px; color: #ffffff;
  }
  p {
    font-size: 14px; color: #a0a0a0;
    line-height: 1.7; margin-bottom: 8px;
  }
  .version {
    display: inline-block;
    background: #2a2a2a; color: #ff6b6b;
    font-size: 13px; font-weight: 600;
    padding: 4px 12px; border-radius: 6px;
    margin: 4px 0 16px 0;
  }
  .btn {
    display: inline-block;
    background: #5a9fd4; color: #ffffff;
    font-size: 14px; font-weight: 500;
    padding: 10px 24px; border-radius: 8px;
    text-decoration: none;
    margin-top: 16px;
  }
  .btn:active { opacity: 0.8; }
  .hint {
    font-size: 12px; color: #666;
    margin-top: 12px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">⚠️</div>
  <h1>WebView 版本过低</h1>
  <p>当前 WebView 版本</p>
  <div class="version" id="ver">检测中…</div>
  <p>需要 <b>85</b> 或更高版本才能运行此应用。</p>
  <p>请前往 Google Play 更新<br><b>Android System WebView</b><br>或安装最新版 <b>Chrome 浏览器</b>。</p>
  <a class="btn" href="market://details?id=com.google.android.webview">前往 Google Play 更新</a>
  <p class="hint">Chrome 85 发布于 2020 年 8 月</p>
</div>
<script>
  (function(){
    var m = navigator.userAgent.match(/Chrome\/(\d+)/);
    var el = document.getElementById('ver');
    if (m && m[1]) {
      el.textContent = 'Chrome ' + m[1] + '（当前）';
    } else {
      el.textContent = '未知版本';
    }
  })();
</script>
</body>
</html>
