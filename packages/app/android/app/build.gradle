apply plugin: 'com.android.application'

android {
    namespace = "io.pictelio.app"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "io.pictelio.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 20201
        versionName "2.2.1"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    signingConfigs {
        release {
            storeFile file("pictelio-release.keystore")
            storePassword System.getenv("PICTELIO_KEYSTORE_PASSWORD")
            keyAlias "pictelio"
            keyPassword System.getenv("PICTELIO_KEY_PASSWORD")
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
}

// 仅在执行 Release 构建时校验签名凭据，避免 Debug 构建需要环境变量
def validateReleaseSigning() {
    def keystorePassword = System.getenv("PICTELIO_KEYSTORE_PASSWORD")
    def keyPassword = System.getenv("PICTELIO_KEY_PASSWORD")
    if (keystorePassword == null || keystorePassword.isEmpty()) {
        throw new GradleException("Missing environment variable PICTELIO_KEYSTORE_PASSWORD. See docs/release-signing.md")
    }
    if (keyPassword == null || keyPassword.isEmpty()) {
        throw new GradleException("Missing environment variable PICTELIO_KEY_PASSWORD. See docs/release-signing.md")
    }
    if (!file("pictelio-release.keystore").exists()) {
        throw new GradleException("Release keystore not found at android/app/pictelio-release.keystore. See docs/release-signing.md")
    }
}

gradle.taskGraph.whenReady { graph ->
    def releaseTasks = [':app:assembleRelease', ':app:packageRelease', ':app:bundleRelease', ':app:signReleaseApk', ':app:signReleaseBundle']
    if (graph.allTasks.any { it.path in releaseTasks }) {
        validateReleaseSigning()
    }
}

repositories {
}

dependencies {
    implementation fileTree(include: ['*.jar', '*.aar'], dir: 'libs')
    implementation fileTree(include: ['*.jar', '*.aar'], dir: '../capacitor-cordova-android-plugins/src/main/libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    implementation("com.squareup.okhttp3:okhttp:4.12.0")
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
